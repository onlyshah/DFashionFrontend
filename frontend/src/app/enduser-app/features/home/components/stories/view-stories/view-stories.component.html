<section class="story-viewer" *ngIf="visible">

  <div class="viewer-backdrop" (click)="onClose()"></div>

  <div class="viewer-shell" role="dialog" aria-modal="true">

    <!-- Side story previews -->
    <div class="side-preview prev-preview"
         *ngIf="hasPrevious"
         (click)="goPrevious()">
      <div class="side-card">
        <img [src]="stories[currentIndex - 1]?.user?.avatar || '/uploads/avatars/default-avatar.svg'" />
      </div>
    </div>

    <!-- Main story card -->
    <div class="story-card"
         (mousedown)="onPointerDown($event)"
         (mouseup)="onPointerUp($event)"
         (touchstart)="onPointerDown($event)"
         (touchend)="onPointerUp($event)">

      <!-- Progress bars -->
      <div class="progress-bar-row">
        <div class="progress-seg" *ngFor="let item of stories; let idx = index">
          <div class="progress-fill"
               [style.width.%]="idx < currentIndex ? 100 : (idx === currentIndex ? storyProgress : 0)">
          </div>
        </div>
      </div>

      <!-- Header -->
      <div class="story-header">
        <div class="user-info">
          <div class="user-avatar">
            <img [src]="getViewerUserAvatar()" [alt]="currentStory?.user?.username" />
          </div>
          <div class="user-meta">
            <span class="username">{{ currentStory?.user?.username || 'Unknown' }}</span>
            <span class="timestamp">
              {{ currentStory?.createdAt ? (currentStory.createdAt | date:'shortTime') : 'just now' }}
            </span>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" (click)="togglePause()"
                  [attr.aria-label]="isPaused ? 'Resume' : 'Pause'">
            <i class="fas" [ngClass]="isPaused ? 'fa-play' : 'fa-pause'"></i>
          </button>
          <button class="icon-btn close-btn" (click)="onClose()" aria-label="Close">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <!-- Media area -->
      <div class="story-media" (click)="togglePause()">

        <!-- Tap zones -->
        <div class="tap-zone left" (click)="onTapZone('left'); $event.stopPropagation()"></div>
        <div class="tap-zone right" (click)="onTapZone('right'); $event.stopPropagation()"></div>

        <img *ngIf="currentMediaType === 'image'"
             [src]="currentMediaUrl"
             (error)="onMediaError($event)"
             (load)="onMediaLoad()"
             alt="Story" />

        <video *ngIf="currentMediaType === 'video'"
               #storyVideo
               [src]="currentMediaUrl"
               autoplay muted playsinline loop
               (loadedmetadata)="onMediaLoad()"
               (error)="onMediaError($event)">
        </video>

        <!-- Caption overlay -->
        <div class="caption-overlay" *ngIf="currentStory?.caption">
          <p class="caption">{{ currentStory.caption }}</p>
        </div>

        <!-- Product CTA -->
        <button class="product-cta" *ngIf="currentProductId"
                (click)="openProduct(); $event.stopPropagation()">
          <i class="fas fa-bag-shopping"></i>
          View Product
        </button>

      </div>

      <!-- Footer actions -->
      <div class="story-footer">
        <div class="action-row">
          <button class="action-btn" [class.liked]="currentStory?.isLiked" (click)="likeStory()">
            <i class="fas" [ngClass]="currentStory?.isLiked ? 'fa-heart' : 'fa-heart'"></i>
          </button>
          <button class="action-btn" (click)="commentStory()">
            <i class="far fa-comment"></i>
          </button>
          <button class="action-btn" (click)="shareStory()">
            <i class="fas fa-paper-plane"></i>
          </button>
          <div class="spacer"></div>
          <button class="action-btn" (click)="addToCart()" [disabled]="!currentProductId">
            <i class="fas fa-cart-plus"></i>
          </button>
          <button class="action-btn" (click)="toggleWishlist()" [disabled]="!currentProductId">
            <i class="far fa-bookmark"></i>
          </button>
        </div>
        <button class="buy-btn" *ngIf="currentProductId" (click)="buyNow()">
          Buy Now
        </button>
      </div>

    </div>

    <!-- Next preview -->
    <div class="side-preview next-preview"
         *ngIf="hasNext"
         (click)="goNext()">
      <div class="side-card">
        <img [src]="stories[currentIndex + 1]?.user?.avatar || '/uploads/avatars/default-avatar.svg'" />
      </div>
    </div>

  </div>

</section>
