<ion-tabs class="instagram-mobile-tabs">
  <!-- Tab 1: Home -->
  <ion-tab-bar slot="bottom" class="instagram-tab-bar">
    <ion-tab-button tab="home" class="tab-btn">
      <ion-icon name="home"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="search" class="tab-btn">
      <ion-icon name="search"></ion-icon>
      <ion-label>Search</ion-label>
    </ion-tab-button>

    <ion-tab-button class="tab-btn create-btn" (click)="onCreateClick()">
      <ion-icon name="add-circle"></ion-icon>
      <ion-label>Create</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="reels" class="tab-btn">
      <ion-icon name="play"></ion-icon>
      <ion-label>Reels</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile" class="tab-btn profile-btn">
      <div class="profile-avatar-tab">
        <img [src]="userAvatar || '/api/images/placeholder-avatar.png'" [alt]="userName">
      </div>
      <ion-label>Profile</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>

<!-- Create Content Modal -->
<app-create-content-modal
  [isOpen]="showCreateModal"
  (close)="onCreateModalClose()"
  (createPost)="onCreatePost($event)"
  (addStory)="onAddStory($event)"
  (createReel)="onCreateReel($event)"
  (goLive)="onGoLive()"
  (moreOptions)="onMoreOptions()">
</app-create-content-modal>

<!-- Stories Viewer -->
<app-view-stories
  [stories]="currentStories"
  [currentIndex]="currentStoryIndex"
  [visible]="showStoriesViewer"
  (close)="onStoriesViewerClose()"
  (changeIndex)="onStoryChange($event)">
</app-view-stories>
