<div class="login-container">
  <!-- Instagram-style Login -->
  <div class="login-box">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="brand-logo">
        <h1>DFashion</h1>
      </div>
      <p class="subtitle">Social E-commerce Platform</p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
      <strong>Login Failed</strong>
      <p>{{ errorMessage }}</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email/Username Field -->
      <div class="form-group">
        <input
          type="email"
          id="email"
          class="form-control"
          formControlName="email"
          placeholder="Mobile number, username or email"
          [disabled]="isLoading"
          autocomplete="email"
        />
        <div class="invalid-feedback" *ngIf="getErrorMessage('email')">
          {{ getErrorMessage('email') }}
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          class="form-control"
          formControlName="password"
          placeholder="Password"
          [disabled]="isLoading"
          autocomplete="current-password"
        />
        <div class="invalid-feedback" *ngIf="getErrorMessage('password')">
          {{ getErrorMessage('password') }}
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn btn-login w-100"
        [disabled]="!loginForm.valid || isLoading"
      >
        <span *ngIf="!isLoading">Log in</span>
        <span *ngIf="isLoading">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Logging in...
        </span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>OR</span>
    </div>

    <!-- Facebook Login -->
    <button type="button" class="btn btn-facebook w-100">
      <i class="fab fa-facebook-f"></i> Log in with Facebook
    </button>

    <!-- Forgot Password -->
    <div class="forgot-section">
      <a routerLink="/auth/forgot-password" class="forgot-link">Forgot password?</a>
    </div>

    <!-- Divider -->
    <div class="border-divider"></div>

    <!-- Sign Up Link -->
    <div class="signup-section">
      <p>Don't have an account? <a routerLink="/auth/register" class="signup-link">Sign up</a></p>
    </div>
  </div>

  <!-- App Store Links -->
  <div class="app-download-section">
    <p>Get the app.</p>
    <div class="app-links">
      <a href="#" class="app-link">
        <img src="/assets/images/app-store.png" alt="Download on App Store">
      </a>
      <a href="#" class="app-link">
        <img src="/assets/images/google-play.png" alt="Get it on Google Play">
      </a>
    </div>
  </div>
</div>
