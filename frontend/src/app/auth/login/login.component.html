<div class="login-wrapper">
  <div class="login-left">
    <div class="marketing-panel">
      <div class="brand-icon">
        <img width="92" height="92"
          [src]="apiUrl + '/uploads/logo/logo.png'"
          alt="DFashion Logo"
          class="brand-logo" />
      </div>

      <div class="hero-preview">
        <app-image-card-slider></app-image-card-slider>
      </div>

      <h1>See everyday Fashion<br>and Followe Your  <span>Favarate fashion influencers .</span></h1>
    </div>
  </div>

  <div class="login-right">
    <div class="login-panel">
      <div class="login-box">
        <div class="login-logo-wrapper">
          <img [src]="apiUrl + '/uploads/logo/logo.png'" alt="DFashion Logo" class="login-logo" />
        </div>
        <h2>Log into DFashion</h2>

        <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
          <strong>Login Failed</strong>
          <p>{{ errorMessage }}</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <div class="form-group">
            <input
              type="email"
              id="email"
              class="form-control"
              formControlName="email"
              placeholder="Mobile number, username or email"
              [disabled]="isLoading"
              autocomplete="email"
            />
            <div class="invalid-feedback" *ngIf="getErrorMessage('email')">
              {{ getErrorMessage('email') }}
            </div>
          </div>

          <div class="form-group">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              class="form-control"
              formControlName="password"
              placeholder="Password"
              [disabled]="isLoading"
              autocomplete="current-password"
            />
            <div class="invalid-feedback" *ngIf="getErrorMessage('password')">
              {{ getErrorMessage('password') }}
            </div>
          </div>

          <button type="submit" class="btn btn-login" [disabled]="!loginForm.valid || isLoading">
            <span *ngIf="!isLoading">Log in</span>
            <span *ngIf="isLoading">
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Logging in...
            </span>
          </button>
        </form>

        <div class="or-divider"><span>OR</span></div>

        <button type="button" class="btn btn-facebook">
          <i class="fab fa-facebook-f"></i> Log in with Facebook
        </button>

        <a routerLink="/auth/forgot-password" class="forgot-link">Forgot password?</a>
        <hr>
        <p>Don't have an account? <a routerLink="/auth/register">
        Create new account</a></p>
   
      </div>

      <div class="signup-box">
        <div class="powered-by">
          <img width="40px" height="40px"
         [src]="apiUrl + '/uploads/logo/logo.png'" alt="DFashion Logo" 
         class="brand-logo" />
     
        Fashion</div>
          </div>

      
    </div>
  </div>
</div>
