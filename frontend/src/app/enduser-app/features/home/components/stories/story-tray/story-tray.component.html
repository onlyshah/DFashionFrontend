<div class="story-tray-container" [class.loading]="loading || storyLoading">
  <div class="story-tray-inner">
    <div class="your-story-static" (click)="onCreateStory()" role="button" aria-label="Create your story">
      <div class="status-ring own-story-ring">
        <div class="image">
          <img [src]="apiUrl + '/uploads/avatars/default-avatar.svg'" alt="Your Story">
        </div>
        <span class="story-plus"><i class="fas fa-plus"></i></span>
      </div>
      <span class="story-label">{{ addStoryText }}</span>
    </div>

    <div class="statuses" #storiesContainer *ngIf="!storyLoading && stories.length > 0; else storiesSkeleton"
         (scroll)="onStoryScroll()"
         (pointerdown)="startDrag($event)"
         (pointermove)="onDrag($event)"
         (pointerup)="endDrag()"
         (pointercancel)="endDrag()"
         (mouseleave)="endDrag()">
      <div class="status" *ngFor="let story of stories; let i = index"
           [ngClass]="{ 'unviewed': !isStorySeen(story), 'viewed': isStorySeen(story) }"
           (click)="onStoryClick(story, i)">
        <div class="status-ring" >
          <div class="image">
            <img [src]="story.user?.avatar || (apiUrl + '/uploads/avatars/default-avatar.svg')"
                 [alt]="story.user?.username || 'Story'">
          </div>
        </div>
        <span class="story-label">{{ story.user?.username || 'Story' }}</span>
        <span class="story-product-badge" *ngIf="story.productId">Shop</span>
      </div>
    </div>
  </div>

  <div class="slide-controls" *ngIf="stories.length && !storyLoading">
    <button class="slide-btn left" [disabled]="!canScrollLeft" (click)="scrollLeft()" aria-label="Scroll stories left">
      <ion-icon name="chevron-back"></ion-icon>
    </button>
    <button class="slide-btn right" [disabled]="!canScrollRight" (click)="scrollRight()" aria-label="Scroll stories right">
      <ion-icon name="chevron-forward"></ion-icon>
    </button>
  </div>

  <ng-container *ngIf="viewerVisible">
    <app-view-stories
      [visible]="viewerVisible"
      [stories]="stories"
      [currentIndex]="viewerIndex"
      (close)="closeViewer()"
      (changeIndex)="changeViewerIndex($event)">
    </app-view-stories>
  </ng-container>

  <ng-template #storiesSkeleton>
    <div class="stories-skeleton">
      <div class="skeleton-item" *ngFor="let n of [1,2,3,4,5,6]"></div>
    </div>
  </ng-template>
</div>
