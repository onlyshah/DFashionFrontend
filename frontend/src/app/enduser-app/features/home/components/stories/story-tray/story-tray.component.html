
<div class="story-tray" [class.is-loading]="storyLoading">

  <!-- Your story — static, never scrolls -->
  <div class="your-story-static" (click)="onCreateStory()" role="button" aria-label="Create your story">
    <div class="avatar-wrap">
      <div class="ring own">
        <div class="avatar">
          <img [src]="apiUrl + '/uploads/avatars/default-avatar.svg'" alt="Your story" />
        </div>
      </div>
      <div class="plus-dot">
        <i class="fas fa-plus"></i>
      </div>
    </div>
    <span class="story-name">{{ addStoryText }}</span>
  </div>

  <!-- Divider -->
  <div class="tray-divider"></div>

  <!-- Scrollable stories strip -->
  <div class="tray-scroll-wrap">
    <div class="tray-scroll" #storiesContainer
         (scroll)="onStoryScroll()"
         (pointerdown)="startDrag($event)"
         (pointermove)="onDrag($event)"
         (pointerup)="endDrag()"
         (pointercancel)="endDrag()"
         (mouseleave)="endDrag()">

      <!-- Skeleton -->
      <ng-container *ngIf="storyLoading">
        <div class="story-item skeleton-item" *ngFor="let n of [1,2,3,4,5,6]">
          <div class="skeleton-ring"></div>
          <div class="skeleton-name"></div>
        </div>
      </ng-container>

      <!-- Stories -->
      <ng-container *ngIf="!storyLoading">
        <ng-container *ngIf="stories.length > 0; else emptyStories">
          <div class="story-item"
               *ngFor="let story of stories; let i = index"
               [class.viewed]="isStorySeen(story)"
               (click)="onStoryClick(story, i)"
               style="cursor: pointer; user-select: none;">
            <div class="avatar-wrap">
              <div class="ring" [class.viewed]="isStorySeen(story)">
                <div class="avatar">
                  <img [src]="story.user?.avatar || (apiUrl + '/uploads/avatars/default-avatar.svg')"
                       [alt]="story.user?.username || 'Story'" />
                </div>
              </div>
              <span class="shop-badge" *ngIf="story.productId">Shop</span>
            </div>
            <span class="story-name">{{ story.user?.username || 'Story' }}</span>
            <span class="time-ago">{{ getTimeAgo(story.createdAt) }}</span>
          </div>
        </ng-container>

        <ng-template #emptyStories>
          <div class="empty-stories">
            <span>No stories yet</span>
          </div>
        </ng-template>
      </ng-container>

    </div>

    <!-- Scroll buttons -->
    <button class="scroll-btn left"
            *ngIf="canScrollLeft"
            (click)="scrollLeft()"
            aria-label="Scroll left">
      <i class="fas fa-chevron-left"></i>
    </button>
    <button class="scroll-btn right"
            *ngIf="canScrollRight"
            (click)="scrollRight()"
            aria-label="Scroll right">
      <i class="fas fa-chevron-right"></i>
    </button>

  </div>

  <!-- Story viewer -->
  <ng-container *ngIf="viewerVisible">
    <app-view-stories
      [visible]="viewerVisible"
      [stories]="stories"
      [currentIndex]="viewerIndex"
      (close)="closeViewer()"
      (changeIndex)="changeViewerIndex($event)">
    </app-view-stories>
  </ng-container>

</div>
