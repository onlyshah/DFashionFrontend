<header class="header">
  <div class="container">
    <div class="header-content">
      <button  class="header-toggle-btn"
       type="button" aria-label="Open sidebar" 
       (click)="onToggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>

      <!-- Logo -->
      <div class="logo">
        <a routerLink="/home">
          <h1 class="gradient-text">DFashion</h1>
        </a>
      </div>

      <!-- Search Icon Button -->
      <button class="search-icon-btn" type="button" aria-label="Toggle search" (click)="toggleExpandedSearch()">
        <i class="fas fa-search"></i>
      </button>

      <!-- Navigation -->
      <nav class="nav-menu">
        <a routerLink="/home" routerLinkActive="active" class="nav-item">
          <i class="fas fa-home"></i>
          <span>Home</span>
        </a>
        <a routerLink="/explore" routerLinkActive="active" class="nav-item">
          <i class="fas fa-compass"></i>
          <span>Explore</span>
        </a>
        <a routerLink="/shop" routerLinkActive="active" class="nav-item">
          <i class="fas fa-shopping-bag"></i>
          <span>Shop</span>
        </a>
        <!-- Wishlist Icon with Count -->
        <a routerLink="/wishlist" routerLinkActive="active" class="nav-item wishlist-item">
          <i class="fas fa-heart"></i>
          <span>Wishlist</span>
          <span class="wishlist-badge" *ngIf="wishlistItemCount > 0">{{ wishlistItemCount }}</span>
          <span class="wishlist-badge zero" *ngIf="currentUser && wishlistItemCount === 0">0</span>
        </a>

        <!-- Cart Icon with Count and Total Amount -->
        <a routerLink="/cart" routerLinkActive="active" class="nav-item cart-item">
          <i class="fas fa-shopping-cart"></i>
          <span>Cart</span>
          <span class="cart-badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
          <span class="cart-badge zero" *ngIf="currentUser && cartItemCount === 0">0</span>

          <!-- Cart total amount display -->
          <!-- <div class="cart-total-display" >
            <span  class="cart-total-text" *ngIf="currentUser && cartTotalAmount > 0"
            >{{ getFormattedCartTotal() }}</span>
          </div> -->
        </a>

        <!-- Total Items Purchased Display -->
        <div class="total-count-item" *ngIf="currentUser">
          <i class="fas fa-shopping-bag"></i>
          <span>Total</span>
          <span class="total-count-badge" *ngIf="getTotalItemCount() > 0">{{ getTotalItemCount() }}</span>
          <span class="total-count-badge zero" *ngIf="getTotalItemCount() === 0">0</span>
         <span  class="cart-total-text" *ngIf="currentUser && cartTotalAmount > 0"
            >{{ getFormattedCartTotal() }}</span>
        </div>

        <!-- User Menu for logged in users -->
        <div *ngIf="currentUser" class="user-menu-wrapper">
          <button type="button" class="user-menu" [class.active]="showUserMenu" aria-haspopup="true" [attr.aria-expanded]="showUserMenu" (click)="toggleUserMenu($event)">
            <img
              [src]="currentUser.image ? backendDefaultAvatar + currentUser.image : (currentUser.avatar ? backendDefaultAvatar + currentUser.avatar : backendDefaultAvatar + 'default-avatar.svg')"
              [alt]="currentUser.fullName"
              class="user-avatar"
              (error)="onAvatarError($event)"
            >
            <span class="username">{{ currentUser.username }}</span>
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>

        <!-- Login/Register for guest users -->
        <div *ngIf="!currentUser" class="auth-buttons">
          <a routerLink="/auth/login" class="btn btn-outline">Login</a>
          <a routerLink="/auth/register" class="btn btn-primary">Sign Up</a>
        </div>
      </nav>

      <!-- User Dropdown Menu - Positioned outside nav to avoid overflow clipping -->
      <div *ngIf="currentUser" class="dropdown-menu" [class.show]="showUserMenu" (click)="$event.stopPropagation()">
        <a routerLink="/profile" class="dropdown-item">
          <i class="fas fa-user"></i>
          Profile
        </a>
        <a routerLink="/settings" class="dropdown-item">
          <i class="fas fa-cog"></i>
          Settings
        </a>
        <div class="dropdown-divider"></div>
        <!-- Customer Dashboard Link -->
        <a *ngIf="currentUser?.role === 'end_user' || currentUser?.role === 'customer'" routerLink="/customer/dashboard" class="dropdown-item">
          <i class="fas fa-tachometer-alt"></i>
          Customer Dashboard
        </a>
        <a *ngIf="currentUser?.role === 'vendor'" routerLink="/vendor/dashboard" class="dropdown-item">
          <i class="fas fa-store"></i>
          Vendor Dashboard
        </a>
        <a *ngIf="currentUser?.role === 'admin'" routerLink="/admin" class="dropdown-item">
          <i class="fas fa-shield-alt"></i>
          Admin Panel
        </a>
        <div class="dropdown-divider"></div>
        <button (click)="logout()" class="dropdown-item logout">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </button>
      </div>
    </div>
  </div>

  <!-- Expanded Full-Width Search Section -->
  <div class="expanded-search-section" *ngIf="showExpandedSearch">
    <div class="expanded-search-container">
      <button class="close-btn" type="button" aria-label="Close search" (click)="closeExpandedSearch()">
        <i class="fas fa-times"></i>
      </button>
      <div class="search-bar-expanded">
        <i class="fas fa-search"></i>
        <input
          id="expandedSearchInput"
          name="expandedSearch"
          type="text"
          placeholder="Search products, brands, categories, creators..."
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
          (input)="onSearchInput()"
          (focus)="onSearchFocus()"
          (blur)="onSearchBlur()"
        >
        <button class="search-submit-btn" type="button" (click)="onSearch()" *ngIf="searchQuery.trim()">
          <i class="fas fa-arrow-right"></i>
        </button>
      </div>
      <!-- Search Suggestions Dropdown in Expanded View -->
      <div class="search-suggestions-expanded" *ngIf="showSuggestions && searchSuggestions.length > 0">
        <div
          *ngFor="let suggestion of searchSuggestions"
          class="suggestion-item"
          (click)="selectSuggestion(suggestion)">
          <i class="fas" [ngClass]="getSuggestionIcon(suggestion.type)"></i>
          <span class="suggestion-text">{{ suggestion.text }}</span>
          <span class="suggestion-type">{{ suggestion.type }}</span>
        </div>
      </div>
    </div>
  </div>
</header>
