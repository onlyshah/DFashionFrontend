<!-- Mobile Layout for Mobile Devices -->
<app-mobile-layout
  *ngIf="isMobile"
  [showHeader]="showHeader"
  [showFooter]="false"
  [showBottomNav]="showMobileBottomNav">
  <router-outlet></router-outlet>
</app-mobile-layout>

<!-- Desktop Layout for Desktop/Tablet -->
<div *ngIf="!isMobile" class="app-container">
  <app-header *ngIf="showHeader && isLoggedIn" [isMobile]="isMobile"></app-header>
  <main class="main-content" [class.with-header]="showHeader && isLoggedIn">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Notifications -->
<app-notification></app-notification>

<!-- Reels Viewer Modal -->
<app-view-reels
  [visible]="reelsViewerVisible"
  [reels]="reelsViewerData"
  [currentIndex]="reelsViewerIndex"
  (close)="closeReelsViewer()"
  (changeIndex)="changeReelsViewerIndex($event)">
</app-view-reels>
