<section class="story-viewer" *ngIf="visible">
  <div class="viewer-backdrop" (click)="onClose()"></div>
  <div class="viewer-shell" role="dialog" aria-modal="true">
    <header class="viewer-header">
      <div class="viewer-brand">
        <span class="brand-text">DFashion</span>
      </div>
      <button class="close-btn" (click)="onClose()" aria-label="Close story viewer">
        <ion-icon name="close"></ion-icon>
      </button>
    </header>

    <div class="viewer-card">
      <div class="viewer-top">
        <div class="story-progress">
          <span
            *ngFor="let item of stories; let idx = index"
            class="progress-segment"
            [class.active]="idx === currentIndex">
          </span>
        </div>

        <div class="story-meta">
          <div class="story-user">
            <div class="meta-avatar">
              <img [src]="currentStory?.user?.avatar || '/assets/default-avatar.svg'" alt="{{ currentStory?.user?.username }}">
            </div>
            <div>
              <div class="username">{{ currentStory?.user?.username || 'Unknown' }}</div>
              <div class="timestamp">{{ currentStory?.createdAt ? (currentStory.createdAt | date:'short') : 'just now' }}</div>
            </div>
          </div>
          <div class="meta-actions">
            <button class="icon-btn"><ion-icon name="ellipsis-horizontal"></ion-icon></button>
          </div>
        </div>
      </div>

      <div class="viewer-body">
        <button class="nav-ghost prev" [disabled]="!hasPrevious" (click)="goPrevious()" aria-label="Previous story">
          <ion-icon name="chevron-back"></ion-icon>
        </button>

        <div class="story-content">
          <div class="story-media">
            <img [src]="currentStory?.mediaUrl || '/assets/default-post.jpg'" alt="Story media">
          </div>
          <div class="story-text">
            <div class="story-caption">{{ currentStory?.caption || 'Tap to reply or swipe to browse more stories.' }}</div>
          </div>
        </div>

        <button class="nav-ghost next" [disabled]="!hasNext" (click)="goNext()" aria-label="Next story">
          <ion-icon name="chevron-forward"></ion-icon>
        </button>
      </div>

      <footer class="viewer-actions">
        <button class="action-btn"><ion-icon name="heart"></ion-icon></button>
        <button class="action-btn"><ion-icon name="chatbubble-outline"></ion-icon></button>
        <button class="action-btn"><ion-icon name="paper-plane"></ion-icon></button>
      </footer>
    </div>
  </div>
</section>
