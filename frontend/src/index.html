<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DFashion - Social E-commerce Platform</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👗</text></svg>">
  <!-- Commented out Google Fonts to avoid network fetch during CI/build when offline -->
  <!-- <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"> -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <!-- Ionic Icons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <!-- Bootstrap (for tooltips) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body class="mat-typography">
  <app-root></app-root>
  <!-- Tooltip init + mapping for icons -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  <script>
    (function(){
      // Mapping from icon names/classes to short action-oriented tooltip text
      const tooltipMap = {
        // common ionicons
        'trash': 'Delete item',
        'trash-outline': 'Delete item',
        'heart': 'Unlike',
        'heart-outline': 'Like',
        'bag': 'Add to cart',
        'bag-outline': 'View product',
        'bag-sharp': 'Add to cart',
        'cart': 'View cart',
        'cart-outline': 'View cart',
        'add': 'Add',
        'add-circle': 'Add',
        'search': 'Search',
        'search-outline': 'Search',
        'play': 'Play',
        'pause': 'Pause',
        'share-outline': 'Share',
        'paper-plane-outline': 'Share',
        'chatbubble-outline': 'Comment',
        'chatbubble': 'Comment',
        'bookmark': 'Save',
        'bookmark-outline': 'Save',
        'close': 'Close',
        'close-circle': 'Remove',
        'arrow-back': 'Go back',
        'chevron-back': 'Previous',
        'chevron-forward': 'Next',
        'ellipsis-vertical': 'More actions',
        'ellipsis-horizontal': 'More actions',
        'camera': 'Open camera',
        'camera-outline': 'Open camera',
        'videocam': 'Record video',
        'videocam-outline': 'Record video',
        'checkmark': 'Confirm',
        'checkmark-circle': 'Confirm',
        'menu': 'Open menu',
        'notifications': 'Notifications',
        'home': 'Home',
        'search': 'Search',
        'play': 'Play',
        'pause': 'Pause',
        'volume-mute': 'Mute',
        'volume-high': 'Unmute',
        'eye-outline': 'View details',
        'star': 'Favorite',
        'star-outline': 'Favorite'
      };

      function getIconKey(el) {
        // ion-icon: name attribute
        if (el.tagName.toLowerCase() === 'ion-icon') {
          return el.getAttribute('name');
        }
        // <i class="fa fa-trash"> or fa-solid fa-trash
        if (el.tagName.toLowerCase() === 'i') {
          const cls = el.className || '';
          const match = cls.match(/fa-(?:solid|regular|light|brands)?\s*fa-([a-z0-9-]+)/) || cls.match(/fa-([a-z0-9-]+)/);
          if (match) return match[1];
          // fallback: check other classes
          const parts = cls.split(/\s+/);
          for (const p of parts) {
            if (p.startsWith('fa-') && p !== 'fa') {
              return p.replace('fa-','');
            }
          }
        }
        // mat-icon -> inner text
        if (el.tagName.toLowerCase() === 'mat-icon') {
          return (el.textContent || '').trim();
        }
        return null;
      }

      function applyTooltips() {
        const nodes = document.querySelectorAll('ion-icon, i[class*="fa-"], mat-icon');
        nodes.forEach(el => {
          try {
            const key = getIconKey(el);
            const tooltipText = tooltipMap[key] || el.getAttribute('aria-label') || el.getAttribute('title');
            if (!tooltipText) return;
            // set bootstrap tooltip attributes
            el.setAttribute('data-bs-toggle', 'tooltip');
            // placement: prefer right for end/slot=end else top
            const slot = el.getAttribute('slot');
            el.setAttribute('data-bs-placement', slot === 'end' || slot === 'icon-only' ? 'right' : 'top');
            el.setAttribute('title', tooltipText);
            // make sure it's focusable for keyboard users
            if (!el.hasAttribute('tabindex')) el.setAttribute('tabindex', '0');
            // initialize tooltip
            // bootstrap available as window.bootstrap
            if (window.bootstrap && window.bootstrap.Tooltip) {
              try { new window.bootstrap.Tooltip(el); } catch(e) { /* ignore init errors */ }
            }
          } catch (e) { /* continue */ }
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyTooltips);
      } else {
        applyTooltips();
      }
    })();
  </script>
</body>
</html>
