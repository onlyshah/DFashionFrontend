<!-- Instagram-style Navigation Sidebar -->
<nav class="instagram-sidebar" [class.collapsed]="isCollapsed">
  <!-- Logo Section -->
  <div class="sidebar-logo-section">
    <div class="logo-container" (click)="navigateToHome()">
      <h2 class="logo-text" *ngIf="!isCollapsed">DFashion</h2>
      <span class="logo-icon" *ngIf="isCollapsed">D</span>
    </div>
  </div>

  <!-- Navigation Links -->
  <div class="sidebar-nav">
    <ul class="nav-list">
      <!-- Home -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/home'" (click)="navigateToHome()" title="Home">
          <i class="fas fa-home"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Home</span>
        </button>
      </li>

      <!-- Explore -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/explore'" (click)="navigateToExplore()" title="Explore">
          <i class="fas fa-compass"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Explore</span>
        </button>
      </li>

      <!-- Messages -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/messages'" (click)="navigateToMessages()" title="Messages">
          <i class="fas fa-comment"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Messages</span>
        </button>
      </li>

      <!-- Notifications -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/notifications'" (click)="navigateToNotifications()" title="Notifications">
          <i class="fas fa-heart"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Notifications</span>
        </button>
      </li>

      <!-- Create -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/create'" (click)="navigateToCreate()" title="Create">
          <i class="fas fa-plus-square"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Create</span>
        </button>
      </li>

      <!-- Stories -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/stories'" (click)="navigateToStories()" title="Stories">
          <i class="fas fa-play-circle"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Stories</span>
        </button>
      </li>

      <!-- Reels -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/reels'" (click)="navigateToReels()" title="Reels">
          <i class="fas fa-video"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Reels</span>
        </button>
      </li>

      <!-- Search -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/search'" (click)="navigateToSearch()" title="Search">
          <i class="fas fa-search"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Search</span>
        </button>
      </li>

      <!-- Shop -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/shop'" (click)="navigateToShop()" title="Shop">
          <i class="fas fa-shopping-bag"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Shop</span>
        </button>
      </li>

      <!-- Wishlist -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/wishlist'" (click)="navigateToWishlist()" title="Wishlist">
          <i class="fas fa-bookmark"></i>
          <span class="nav-label" *ngIf="!isCollapsed">Wishlist</span>
        </button>
      </li>

      <!-- Cart -->
      <li>
        <button class="nav-item" [class.active]="currentRoute === '/cart'" (click)="navigateToCart()" title="Cart">
          <i class="fas fa-shopping-cart"></i>
          <span class="nav-label" *ngIf="!isCollapsed">
            Cart
            <span class="badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
          </span>
        </button>
      </li>
    </ul>
  </div>

  <!-- Bottom Section -->
  <div class="sidebar-bottom">
    <!-- User Profile -->
    <button class="nav-item" [class.active]="currentRoute === '/profile'" (click)="navigateToProfile()" title="Profile">
      <div class="profile-avatar-small">
        <img [src]="userAvatar || '/api/images/placeholder-avatar.png'" [alt]="userName">
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Profile</span>
    </button>

    <!-- More Options -->
    <button class="nav-item" (click)="openMoreOptions()" title="More">
      <i class="fas fa-bars"></i>
      <span class="nav-label" *ngIf="!isCollapsed">More</span>
    </button>

    <!-- Collapse Toggle (Desktop Only) -->
    <button class="collapse-toggle" (click)="toggleCollapse()" title="Toggle sidebar" *ngIf="!isMobile">
      <i class="fas" [class.fa-chevron-left]="!isCollapsed" [class.fa-chevron-right]="isCollapsed"></i>
    </button>
  </div>
</nav>

<!-- More options sidebar overlay -->
<div class="more-options-overlay" *ngIf="isMoreMenuOpen">
  <div class="overlay-backdrop" (click)="closeMoreOptions()"></div>
  <aside class="more-options-menu">
    <div class="more-options-head">
      <span>More actions</span>
      <button class="close-btn" (click)="closeMoreOptions()">×</button>
    </div>
    <button class="menu-item" (click)="onMoreItemClick('settings')">Settings</button>
    <button class="menu-item" (click)="onMoreItemClick('help')">Help</button>
    <button class="menu-item" (click)="onMoreItemClick('logout')">Log out</button>
  </aside>
</div>
