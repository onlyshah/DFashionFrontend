<section class="featured-brands-section">
  <div class="sec-head">
    <div class="sec-title-wrap">
      <h2 class="sec-title">
        <ion-icon name="diamond"></ion-icon>
        Featured Brands
      </h2>
      <p class="sec-sub">Top brands with amazing collections</p>
    </div>
    <button class="view-all" type="button" (click)="onViewAll()">
      View All
      <ion-icon name="chevron-forward"></ion-icon>
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-container">
    <div class="loading-grid">
      <div *ngFor="let item of [1,2,3,4,5,6]" class="loading-card">
        <div class="loading-logo"></div>
        <div class="loading-content">
          <div class="loading-line short"></div>
          <div class="loading-line medium"></div>
          <div class="loading-line long"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !isLoading" class="error-container">
    <ion-icon name="alert-circle" class="error-icon"></ion-icon>
    <p class="error-message">{{ error }}</p>
    <button class="retry-btn" (click)="onRetry()">
      <ion-icon name="refresh"></ion-icon>
      Try Again
    </button>
  </div>

  <!-- Brands Slider -->
  <div *ngIf="!isLoading && !error && featuredBrands.length > 0" class="brands-slider-container">
    <!-- Navigation Buttons -->
    <button class="slider-nav prev-btn" (click)="slidePrev()" [disabled]="currentSlide === 0">
      <ion-icon name="chevron-back"></ion-icon>
    </button>
    <button class="slider-nav next-btn" (click)="slideNext()" [disabled]="currentSlide >= maxSlide">
      <ion-icon name="chevron-forward"></ion-icon>
    </button>

    <!-- Slider Wrapper -->
    <div class="brands-slider-wrapper" (mouseenter)="pauseAutoSlide()" (mouseleave)="resumeAutoSlide()">
      <div class="brands-slider" [style.transform]="'translateX(' + slideOffset + 'px)'">
        <button
          *ngFor="let brand of featuredBrands; trackBy: trackByBrandName"
          class="brand-card"
          type="button"
          (click)="onBrandClick(brand)"
          [attr.aria-label]="'Open ' + getBrandName(brand)"
        >
          <span class="brand-logo" [style.background]="getBrandAccent(brand, 'background')" [style.color]="getBrandAccent(brand, 'color')">
            <img
              *ngIf="brand.logo"
              [src]="brand.logo.startsWith('http') ? brand.logo : imageUrl + brand.logo"
              [alt]="getBrandName(brand) + ' logo'"
              loading="lazy"
            />
            <span *ngIf="!brand.logo">{{ getBrandInitials(brand) }}</span>
          </span>
          <span class="brand-name">{{ getBrandName(brand) }}</span>
          <span class="brand-stars" [attr.aria-label]="getBrandRating(brand) + ' out of 5 stars'">
            <ion-icon *ngFor="let star of [1, 2, 3, 4, 5]" [name]="star <= getBrandRating(brand) ? 'star' : 'star-outline'"></ion-icon>
          </span>
          <span class="brand-ct">{{ getBrandProductCount(brand) }} Products</span>
          <span class="brand-feat">
            <ion-icon name="star"></ion-icon>
            Featured
          </span>
        </button>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && !error && featuredBrands.length === 0" class="state-card empty-card">
    <ion-icon name="diamond-outline"></ion-icon>
    <h3>No Featured Brands</h3>
    <p>Check back later for featured brand collections</p>
  </div>
</section>
